<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Menu</title>
    <style>
        /* Сброс стилей и базовые настройки */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Заголовок страницы */
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.7);
        }

        /* Сетка для меню */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 0 10px;
        }

        /* Карточка каждого урока/раздела */
        .menu-item {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        /* Эффект при нажатии (для телефонов) */
        .menu-item:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Иконка урока */
        .icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
        }

        /* Название урока */
        .title {
            color: #34495e;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        /* Цветовые вариации для каждой кнопки */
        .item-1 { border-top: 6px solid #FF6B6B; }
        .item-2 { border-top: 6px solid #4ECDC4; }
        .item-3 { border-top: 6px solid #FFD166; }
        .item-4 { border-top: 6px solid #118AB2; }

        .menu-item .icon {
            width: 48px;  /* Задайте нужную вам ширину иконки */
            height: 48px; /* Задайте нужную вам высоту иконки */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-item .icon svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

    </style>
</head>
<body>

    <h1>🚀 Choose your game:</h1>
    <div class="menu-grid">
                
        <!-- Кнопка 1: Флеш-карты -->
        <a href="https://alexnearby.github.io/class_1/flash_cards.html" class="menu-item item-1">
            <div class="icon">
                <svg xmlns="http://w3.org" viewBox="0 0 256 256" width="100%" height="100%">
                    <defs>
                        <style>
                            .fc-card-new { rx: 16px; }
                            .fc-back { fill: #5C6BC0; }    /* Глубокий индиго */
                            .fc-mid { fill: #26A69A; }     /* Мятный зеленый */
                            .fc-front { fill: #FFAB91; }   /* Нежный персиковый */
                            .fc-display { fill: #FFFFFF; rx: 8px; }
                            .fc-letter { fill: #4E342E; font-family: 'Montserrat', Arial, sans-serif; font-size: 58px; font-weight: 800; letter-spacing: -2; }
                            .fc-line-new { stroke: #4E342E; stroke-width: 8; stroke-linecap: round; opacity: 0.8; }
                        </style>
                    </defs>
                    <!-- Задняя карточка -->
                    <rect class="fc-card-new fc-back" x="30" y="20" width="140" height="190" />
                    <!-- Средняя карточка -->
                    <rect class="fc-card-new fc-mid" x="58" y="38" width="140" height="190" />
                    <!-- Передняя карточка -->
                    <rect class="fc-card-new fc-front" x="86" y="56" width="140" height="190" />
                    
                    <!-- Белое поле для текста -->
                    <rect class="fc-display" x="106" y="76" width="100" height="80" />
                    <text class="fc-letter" x="116" y="136">Aa</text>
                    
                    <!-- Декоративные линии текста -->
                    <line class="fc-line-new" x1="116" y1="180" x2="196" y2="180" />
                    <line class="fc-line-new" x1="116" y1="202" x2="165" y2="202" />
                </svg>
            </div>
            <div class="title">Flashcards</div>
        </a>
        <!-- Кнопка 2: Порядок слов -->
        <a href="https://alexnearby.github.io/class_1/word_order_game.html" class="menu-item item-2">
            <div class="icon">
                <svg xmlns="http://w3.org" viewBox="0 0 256 256" width="100%" height="100%">
                    <defs>
                        <style>
                            .tile-w { fill: #FFB74D; rx: 16px; } /* Пастельный оранжевый */
                            .tile-o { fill: #FF8A80; rx: 16px; } /* Пастельный коралловый */
                            .tile-r { fill: #4DB6AC; rx: 16px; } /* Пастельный бирюзовый */
                            .tile-d { fill: #BA68C8; rx: 16px; } /* Пастельный фиолетовый */
                            .wo-text-new { fill: #FFFFFF; font-family: 'Montserrat', 'Arial Black', sans-serif; font-size: 64px; font-weight: 900; text-anchor: middle; dominant-baseline: central; }
                        </style>
                    </defs>
                    <!-- Плитка W -->
                    <g transform="translate(25, 25)">
                        <rect class="tile-w" x="0" y="0" width="96" height="96" />
                        <text class="wo-text-new" x="48" y="50">W</text>
                    </g>
                    <!-- Плитка O -->
                    <g transform="translate(135, 25)">
                        <rect class="tile-o" x="0" y="0" width="96" height="96" />
                        <text class="wo-text-new" x="48" y="50">O</text>
                    </g>
                    <!-- Плитка R -->
                    <g transform="translate(25, 135)">
                        <rect class="tile-r" x="0" y="0" width="96" height="96" />
                        <text class="wo-text-new" x="48" y="50">R</text>
                    </g>
                    <!-- Плитка D -->
                    <g transform="translate(135, 135)">
                        <rect class="tile-d" x="0" y="0" width="96" height="96" />
                        <text class="wo-text-new" x="48" y="50">D</text>
                    </g>
                </svg>
            </div>
            <div class="title">Word Order</div>
        </a>

    </div>

</body>
</html>
